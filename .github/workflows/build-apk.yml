name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install Cordova
      run: npm install -g cordova@12.0.0

    - name: Install dependencies
      run: npm install

    - name: Add Android platform
      run: cordova platform add android@12.0.1

    - name: Build release APK
      run: cordova build android --release -- --gradleArg=-PcdvBuildMultipleApks=false

    - name: List APK output
      run: find platforms/android -name "*.apk" 2>/dev/null

    - name: Sign APK
      run: |
        APK=$(find platforms/android -name "app-release-unsigned.apk" | head -1)
        echo "Signing: $APK"
        BUILD_TOOLS=$ANDROID_HOME/build-tools/$(ls $ANDROID_HOME/build-tools | tail -1)
        jarsigner -verbose \
          -sigalg SHA256withRSA \
          -digestalg SHA-256 \
          -keystore keystore/revsa.keystore \
          -storepass RevSA2026 \
          -keypass RevSA2026 \
          "$APK" revsaproposals
        $BUILD_TOOLS/zipalign -v 4 "$APK" RevSA-Proposals.apk
        echo "APK signed and aligned"

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: RevSA-Proposals-APK
        path: RevSA-Proposals.apk
