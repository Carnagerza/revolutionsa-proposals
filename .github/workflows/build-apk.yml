name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Node.js 18
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install Android build tools
      run: |
        sdkmanager "platforms;android-33" "build-tools;33.0.2" "platform-tools"

    - name: Install Cordova 11
      run: npm install -g cordova@11.1.0

    - name: Install cordova-android 11
      run: |
        npm install
        npm install cordova-android@11.0.0 --save

    - name: Add Android platform
      run: |
        cordova platform remove android || true
        cordova platform add android@11.0.0

    - name: Set Gradle version
      run: |
        cd platforms/android
        cat > gradle/wrapper/gradle-wrapper.properties << 'GRADLE'
        distributionBase=GRADLE_USER_HOME
        distributionPath=wrapper/dists
        distributionUrl=https\://services.gradle.org/distributions/gradle-7.6.4-all.zip
        zipStoreBase=GRADLE_USER_HOME
        zipStorePath=wrapper/dists
        GRADLE
        echo "Gradle wrapper set to 7.6.4"

    - name: Build APK
      run: |
        export JAVA_HOME=$(dirname $(dirname $(readlink -f $(which java))))
        cordova build android --release

    - name: Find and sign APK
      run: |
        APK=$(find platforms/android -name "app-release-unsigned.apk" | head -1)
        echo "Found APK: $APK"
        BUILD_TOOLS=$ANDROID_HOME/build-tools/33.0.2
        jarsigner -verbose \
          -sigalg SHA256withRSA \
          -digestalg SHA-256 \
          -keystore keystore/revsa.keystore \
          -storepass RevSA2026 \
          -keypass RevSA2026 \
          "$APK" revsaproposals
        $BUILD_TOOLS/zipalign -v 4 "$APK" RevSA-Proposals.apk
        ls -lh RevSA-Proposals.apk

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: RevSA-Proposals-APK
        path: RevSA-Proposals.apk
        retention-days: 30
