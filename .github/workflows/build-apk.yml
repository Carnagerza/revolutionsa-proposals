name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install SDK components
      run: sdkmanager --sdk_root=$ANDROID_HOME "platforms;android-33" "build-tools;33.0.2"

    - name: Create project structure
      run: |
        mkdir -p app/src/main/java/co/za/revsa/proposals
        mkdir -p app/src/main/assets/www
        mkdir -p app/src/main/res/values
        mkdir -p app/src/main/res/mipmap-hdpi
        mkdir -p app/src/main/res/mipmap-mdpi
        mkdir -p app/src/main/res/mipmap-xhdpi
        mkdir -p app/src/main/res/mipmap-xxhdpi
        mkdir -p app/src/main/res/mipmap-xxxhdpi
        mkdir -p gradle/wrapper
        cp www/index.html app/src/main/assets/www/index.html
        echo "HTML: $(wc -c < app/src/main/assets/www/index.html) bytes"

    - name: Create MainActivity
      run: |
        cat > app/src/main/java/co/za/revsa/proposals/MainActivity.java << 'JAVA'
package co.za.revsa.proposals;
import android.app.Activity;
import android.os.Bundle;
import android.webkit.WebView;
import android.webkit.WebViewClient;
import android.webkit.WebSettings;
import android.webkit.WebChromeClient;
import android.view.Window;
import android.view.WindowManager;
import android.graphics.Color;
import android.os.Build;
public class MainActivity extends Activity {
    private WebView webView;
    @Override
    protected void onCreate(Bundle savedInstanceState) {
        super.onCreate(savedInstanceState);
        requestWindowFeature(Window.FEATURE_NO_TITLE);
        if (Build.VERSION.SDK_INT >= 21) {
            getWindow().setStatusBarColor(Color.parseColor("#1a1a1a"));
        }
        webView = new WebView(this);
        setContentView(webView);
        WebSettings s = webView.getSettings();
        s.setJavaScriptEnabled(true);
        s.setDomStorageEnabled(true);
        s.setAllowFileAccessFromFileURLs(true);
        s.setAllowUniversalAccessFromFileURLs(true);
        s.setLoadWithOverviewMode(true);
        s.setUseWideViewPort(true);
        s.setBuiltInZoomControls(false);
        webView.setWebViewClient(new WebViewClient());
        webView.setWebChromeClient(new WebChromeClient());
        webView.setBackgroundColor(Color.parseColor("#1a1a1a"));
        webView.loadUrl("file:///android_asset/www/index.html");
    }
    @Override
    public void onBackPressed() {
        if (webView.canGoBack()) webView.goBack();
        else super.onBackPressed();
    }
}
JAVA

    - name: Create AndroidManifest
      run: |
        cat > app/src/main/AndroidManifest.xml << 'XML'
<?xml version="1.0" encoding="utf-8"?>
<manifest xmlns:android="http://schemas.android.com/apk/res/android" package="co.za.revsa.proposals">
    <uses-permission android:name="android.permission.INTERNET"/>
    <application
        android:allowBackup="true"
        android:label="RevSA Proposals"
        android:icon="@mipmap/ic_launcher"
        android:hardwareAccelerated="true"
        android:usesCleartextTraffic="true">
        <activity android:name=".MainActivity" android:exported="true"
            android:screenOrientation="portrait"
            android:configChanges="orientation|keyboardHidden|screenSize">
            <intent-filter>
                <action android:name="android.intent.action.MAIN"/>
                <category android:name="android.intent.category.LAUNCHER"/>
            </intent-filter>
        </activity>
    </application>
</manifest>
XML

    - name: Create Gradle files
      run: |
        cat > settings.gradle << 'GRADLE'
rootProject.name = "RevSAProposals"
include ':app'
GRADLE
        cat > build.gradle << 'GRADLE'
buildscript {
    repositories { google(); mavenCentral() }
    dependencies { classpath 'com.android.tools.build:gradle:8.1.2' }
}
allprojects { repositories { google(); mavenCentral() } }
GRADLE
        cat > app/build.gradle << 'GRADLE'
apply plugin: 'com.android.application'
android {
    compileSdkVersion 33
    defaultConfig {
        applicationId "co.za.revsa.proposals"
        minSdkVersion 22
        targetSdkVersion 33
        versionCode 1
        versionName "1.0"
    }
    signingConfigs {
        release {
            storeFile file("../../keystore/revsa.keystore")
            storePassword "RevSA2026"
            keyAlias "revsaproposals"
            keyPassword "RevSA2026"
        }
    }
    buildTypes {
        release {
            minifyEnabled false
            signingConfig signingConfigs.release
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}
dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
}
GRADLE
        cat > gradle/wrapper/gradle-wrapper.properties << 'PROPS'
distributionBase=GRADLE_USER_HOME
distributionPath=wrapper/dists
distributionUrl=https\://services.gradle.org/distributions/gradle-8.1.1-bin.zip
zipStoreBase=GRADLE_USER_HOME
zipStorePath=wrapper/dists
PROPS

    - name: Create app icons
      run: |
        python3 << 'PYEOF'
import struct, zlib, os
def make_png(size):
    w=h=size; raw=b''; cx=cy=w//2; r=w*0.42
    for y in range(h):
        raw+=b'\x00'
        for x in range(w):
            dx,dy=x-cx,y-cy
            if (dx*dx+dy*dy)**0.5<r: raw+=bytes([245,197,24,255])
            else: raw+=bytes([26,26,26,255])
    comp=zlib.compress(raw,6)
    def chunk(n,d): c=zlib.crc32(n+d)&0xffffffff; return struct.pack('>I',len(d))+n+d+struct.pack('>I',c)
    p=b'\x89PNG\r\n\x1a\n'+chunk(b'IHDR',struct.pack('>IIBBBBB',w,h,8,6,0,0,0))+chunk(b'IDAT',comp)+chunk(b'IEND',b'')
    return p
for folder,size in [('mipmap-mdpi',48),('mipmap-hdpi',72),('mipmap-xhdpi',96),('mipmap-xxhdpi',144),('mipmap-xxxhdpi',192)]:
    path=f'app/src/main/res/{folder}/ic_launcher.png'
    os.makedirs(os.path.dirname(path),exist_ok=True)
    open(path,'wb').write(make_png(size))
print("Icons done")
PYEOF

    - name: Create strings resource
      run: |
        cat > app/src/main/res/values/strings.xml << 'XML'
<?xml version="1.0" encoding="utf-8"?>
<resources><string name="app_name">RevSA Proposals</string></resources>
XML

    - name: Setup Gradle wrapper
      run: gradle wrapper --gradle-version 8.1.1

    - name: Build APK
      run: |
        export ANDROID_HOME=/usr/local/lib/android/sdk
        chmod +x gradlew
        ./gradlew assembleRelease

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: RevSA-Proposals-APK
        path: app/build/outputs/apk/release/*.apk
        retention-days: 30
