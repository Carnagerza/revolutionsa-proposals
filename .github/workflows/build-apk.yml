name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK
        run: sdkmanager --sdk_root=$ANDROID_HOME "platforms;android-33" "build-tools;33.0.2"

      - name: Copy HTML to assets
        run: cp www/index.html app/src/main/assets/www/index.html

      - name: Generate icons
        run: python3 scripts/make_icons.py

      - name: Setup Gradle wrapper
        run: gradle wrapper --gradle-version 8.1.1 && chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: RevSA-Proposals-APK
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30
