name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK
        run: sdkmanager --sdk_root=$ANDROID_HOME "platforms;android-33" "build-tools;33.0.2"

      - name: Copy HTML to assets
        run: |
          mkdir -p app/src/main/assets/www
          cp www/index.html app/src/main/assets/www/index.html

      - name: Generate icons
        run: python3 scripts/make_icons.py

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleRelease --no-daemon

      - name: Sign APK
        run: |
          BUILD_TOOLS=$ANDROID_HOME/build-tools/33.0.2
          APK=app/build/outputs/apk/release/app-release-unsigned.apk
          jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 \
            -keystore keystore/revsa.keystore \
            -storepass RevSA2026 -keypass RevSA2026 \
            "$APK" revsaproposals
          $BUILD_TOOLS/zipalign -v 4 "$APK" RevSA-Proposals.apk
          ls -lh RevSA-Proposals.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: RevSA-Proposals-APK
          path: RevSA-Proposals.apk
          retention-days: 30
