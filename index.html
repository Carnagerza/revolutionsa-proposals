<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RevolutionSA Proposal Builder</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      background: #f5f5f5;
      color: #111;
    }

    header {
      background: #000;
      color: white;
      padding: 20px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      border-bottom: 5px solid #FFD400;
    }

    header img {
      height: 80px;
    }

    header h1 {
      font-size: 28px;
      font-weight: 700;
    }

    .container {
      padding: 30px;
      max-width: 1400px;
      margin: auto;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      flex-wrap: wrap;
      gap: 15px;
    }

    .search-box input {
      padding: 12px;
      width: 300px;
      border: 2px solid #000;
      border-radius: 10px;
      font-size: 15px;
    }

    .stock-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }

    .product-card {
      background: white;
      border-radius: 15px;
      padding: 20px;
      border: 2px solid #000;
      transition: 0.2s ease;
      box-shadow: 0 5px 15px rgba(0,0,0,0.08);
    }

    .product-card:hover {
      transform: translateY(-5px);
    }

    .product-card h3 {
      margin-bottom: 10px;
      color: #000;
    }

    .price {
      color: #FFD400;
      font-size: 22px;
      font-weight: bold;
      margin-bottom: 15px;
    }

    .qty-controls {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 15px;
    }

    .qty-controls input {
      width: 70px;
      padding: 8px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      cursor: pointer;
      border: none;
      border-radius: 10px;
      transition: 0.2s ease;
    }

    .add-btn {
      width: 100%;
      padding: 12px;
      background: #FFD400;
      color: black;
      font-weight: bold;
      font-size: 15px;
    }

    .add-btn:hover {
      background: #ffca00;
    }

    .cart-panel {
      margin-top: 40px;
      background: white;
      padding: 25px;
      border-radius: 20px;
      border: 2px solid #000;
      box-shadow: 0 5px 15px rgba(0,0,0,0.08);
    }

    .cart-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid #ddd;
    }

    .cart-total {
      margin-top: 20px;
      font-size: 24px;
      font-weight: bold;
      color: #000;
    }

    .proposal-btn {
      margin-top: 20px;
      padding: 15px 25px;
      background: black;
      color: white;
      font-weight: bold;
      font-size: 16px;
    }

    .proposal-btn:hover {
      background: #222;
    }

    .proposal-page {
      display: none;
      background: white;
      padding: 40px;
      border-radius: 20px;
      margin-top: 30px;
      border: 2px solid #000;
    }

    .proposal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      border-bottom: 3px solid #FFD400;
      padding-bottom: 20px;
      flex-wrap: wrap;
      gap: 15px;
    }

    .proposal-header img {
      height: 70px;
    }

    .proposal-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }

    .proposal-table th {
      background: #000;
      color: white;
      padding: 12px;
      text-align: left;
    }

    .proposal-table td {
      padding: 12px;
      border-bottom: 1px solid #ddd;
    }

    .grand-total {
      text-align: right;
      margin-top: 20px;
      font-size: 28px;
      color: #000;
      font-weight: bold;
    }

    .footer-note {
      margin-top: 40px;
      text-align: center;
      color: #555;
    }

    .client-info {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 15px;
      margin-bottom: 30px;
    }

    .client-info input {
      padding: 12px;
      border: 2px solid #000;
      border-radius: 10px;
    }

    .print-btn {
      background: #FFD400;
      color: black;
      padding: 12px 20px;
      margin-top: 20px;
      font-weight: bold;
    }

    @media print {
      body * {
        visibility: hidden;
      }

      #proposalPage, #proposalPage * {
        visibility: visible;
      }

      #proposalPage {
        position: absolute;
        left: 0;
        top: 0;
        width: 100%;
      }
    }
  </style>
</head>
<body>

<header>
  <div>
    <img src="logo.png" alt="RevolutionSA Logo">
  </div>
  <div>
    <h1>RevolutionSA Proposal Builder</h1>
  </div>
</header>

<div class="container">

  <div class="top-bar">
    <div>
      <h2>Sales Proposal System</h2>
      <p>Create professional client quotations instantly.</p>
    </div>

    <div class="search-box">
      <input type="text" id="search" placeholder="Search stock items..." onkeyup="filterProducts()">
    </div>
  </div>

  <div class="client-info">
    <input type="text" id="clientName" placeholder="Client Name">
    <input type="text" id="companyName" placeholder="Company Name">
    <input type="text" id="clientEmail" placeholder="Client Email">
    <input type="text" id="proposalNumber" placeholder="Proposal Number">
  </div>

  <div class="stock-grid" id="stockGrid"></div>

  <div class="cart-panel">
    <h2>Cart Summary</h2>
    <div id="cartItems"></div>
    <div class="cart-total">Total: R<span id="totalAmount">0.00</span></div>
    <button class="proposal-btn" onclick="generateProposal()">Generate Proposal</button>
  </div>

  <div class="proposal-page" id="proposalPage">

    <div class="proposal-header">
      <div>
        <img src="logo.png" alt="Logo">
      </div>

      <div>
        <h2>Sales Proposal</h2>
        <p id="proposalDate"></p>
      </div>
    </div>

    <div>
      <h3>Client Details</h3>
      <p><strong>Client:</strong> <span id="finalClient"></span></p>
      <p><strong>Company:</strong> <span id="finalCompany"></span></p>
      <p><strong>Email:</strong> <span id="finalEmail"></span></p>
      <p><strong>Proposal #:</strong> <span id="finalProposal"></span></p>
    </div>

    <table class="proposal-table">
      <thead>
        <tr>
          <th>Item</th>
          <th>Qty</th>
          <th>Unit Price</th>
          <th>Total</th>
        </tr>
      </thead>
      <tbody id="proposalItems"></tbody>
    </table>

    <div class="grand-total">
      Grand Total: R<span id="proposalTotal"></span>
    </div>

    <button class="print-btn" onclick="window.print()">Print / Save PDF</button>

    <div class="footer-note">
      Thank you for choosing RevolutionSA Office Solutions.
    </div>

  </div>

</div>

<script>

  const stock = [
    {
      name: 'Printer',
      price: 2500
    },
    {
      name: 'Office Chair',
      price: 1500
    },
    {
      name: 'Laptop',
      price: 12000
    },
    {
      name: 'Monitor',
      price: 4000
    },
    {
      name: 'Desk',
      price: 3200
    },
    {
      name: 'Network Switch',
      price: 1800
    },
    {
      name: 'WiFi Access Point',
      price: 2300
    },
    {
      name: 'CCTV Camera',
      price: 950
    }
  ];

  let cart = [];

  const stockGrid = document.getElementById('stockGrid');

  function renderProducts(products) {

    stockGrid.innerHTML = '';

    products.forEach((item, index) => {

      const card = document.createElement('div');
      card.className = 'product-card';

      card.innerHTML = `
        <h3>${item.name}</h3>
        <div class="price">R${item.price.toFixed(2)}</div>

        <div class="qty-controls">
          <label>Qty:</label>
          <input type="number" min="1" value="1" id="qty-${index}">
        </div>

        <button class="add-btn" onclick="addToCart(${index})">
          Add to Cart
        </button>
      `;

      stockGrid.appendChild(card);
    });
  }

  function addToCart(index) {

    const qty = parseInt(document.getElementById(`qty-${index}`).value);

    const product = stock[index];

    cart.push({
      name: product.name,
      price: product.price,
      qty: qty,
      total: product.price * qty
    });

    renderCart();
  }

  function renderCart() {

    const cartItems = document.getElementById('cartItems');
    const totalAmount = document.getElementById('totalAmount');

    cartItems.innerHTML = '';

    let total = 0;

    cart.forEach((item, index) => {

      total += item.total;

      const row = document.createElement('div');
      row.className = 'cart-item';

      row.innerHTML = `
        <div>
          <strong>${item.name}</strong><br>
          Qty: ${item.qty}
        </div>

        <div>
          R${item.total.toFixed(2)}
        </div>
      `;

      cartItems.appendChild(row);
    });

    totalAmount.textContent = total.toFixed(2);
  }

  function generateProposal() {

    const proposalPage = document.getElementById('proposalPage');
    const proposalItems = document.getElementById('proposalItems');

    proposalItems.innerHTML = '';

    let total = 0;

    cart.forEach(item => {

      total += item.total;

      const row = document.createElement('tr');

      row.innerHTML = `
        <td>${item.name}</td>
        <td>${item.qty}</td>
        <td>R${item.price.toFixed(2)}</td>
        <td>R${item.total.toFixed(2)}</td>
      `;

      proposalItems.appendChild(row);
    });

    document.getElementById('proposalTotal').textContent = total.toFixed(2);

    document.getElementById('finalClient').textContent = document.getElementById('clientName').value;
    document.getElementById('finalCompany').textContent = document.getElementById('companyName').value;
    document.getElementById('finalEmail').textContent = document.getElementById('clientEmail').value;
    document.getElementById('finalProposal').textContent = document.getElementById('proposalNumber').value;

    const date = new Date();

    document.getElementById('proposalDate').textContent = date.toLocaleDateString();

    proposalPage.style.display = 'block';

    proposalPage.scrollIntoView({
      behavior: 'smooth'
    });
  }

  function filterProducts() {

    const search = document.getElementById('search').value.toLowerCase();

    const filtered = stock.filter(item =>
      item.name.toLowerCase().includes(search)
    );

    renderProducts(filtered);
  }

  renderProducts(stock);

</script>

</body>
</html>
